version: '3.8'
name: prod-tracking

services:
  frontend:
    platform: linux/amd64
    restart: always
    build:
      context: ../services/frontend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:9082:80"
    env_file:
      - ../env_files/.env.prod

  app-react:
      restart: always
      build:
        context: ../services/app-react
        dockerfile: Dockerfile.prod
        args:
          - VITE_BASE_URL=${VITE_BASE_URL}
          - VITE_BASE_PHOTO=${VITE_BASE_PHOTO}
      env_file:
      - ../env_files/.env.prod
      volumes:
        - ../services/app-react/src:/app/src
      ports:
        - "127.0.0.1:5182:5173"

  nginx:
    build:
      context: ../services/nginx
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - ../env_files/.env.prod
    volumes:
      - ../services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../services/backend/app:/var/www/html
    ports:
      - "127.0.0.1:84:82"

  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - ../env_files/.env.prod
    volumes:
      - ../services/backend/app:/var/www/html
      - vendor_data:/var/www/html/vendor
    ports:
      - "127.0.0.1:3087:9000"
    expose: 
        - 9000
    
  database:
    image: mysql:8.0.36
    restart: always
    env_file:
      - ../env_files/.env.prod
    ports:
      - 127.0.0.1:${DB_EXTERNAL_PORT}:3306
    expose: 
        - 33006
    volumes:
      - ../services/database/db_init_scripts:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

volumes:
  vendor_data:
  mysql_data:
