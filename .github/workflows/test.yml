name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/app-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/app-react/package-lock.json

      - run: npm ci

      - run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: services/app-react/coverage/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: services/app-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/app-react/package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          VITE_MSW_ENABLED: 'true'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: services/app-react/playwright-report/
          retention-days: 7
